<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://api.dictionaryapi.dev https://api.mymemory.translated.net;">
  <title>Kriti – Lookup</title>
  <style>
    :root {
      --header: #667eea;
      --bg: #f4f6fc;
      --card: #ffffff;
      --muted: #667085;
      --text: #1f2430;
      --line: #e8ebf5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top right, #dce2ff 0%, var(--bg) 36%);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--header);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(58,73,160,0.35);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.85; }
    .btn-notes {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-notes:hover { background: rgba(255,255,255,0.28); }

    /* Search bar */
    .search-bar {
      padding: 14px 16px 0;
      flex-shrink: 0;
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-row input {
      flex: 1;
      padding: 9px 14px;
      border: 1.5px solid var(--line);
      border-radius: 24px;
      font-size: 15px;
      font-family: inherit;
      background: var(--card);
      outline: none;
      color: var(--text);
    }
    .search-row input:focus { border-color: var(--header); }
    .search-row button {
      padding: 9px 18px;
      background: var(--header);
      color: #fff;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
    }
    .search-row button:hover { background: #5a6fd6; }

    /* Language selector */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .lang-row label { font-size: 12px; color: var(--muted); }
    .lang-select {
      padding: 4px 10px;
      border-radius: 12px;
      border: 1.5px solid var(--line);
      font-size: 12px;
      font-family: inherit;
      background: var(--card);
      cursor: pointer;
    }

    /* Results */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 16px;
    }

    .placeholder {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 14px;
      line-height: 1.7;
    }
    .placeholder .hint { font-size: 12px; opacity: 0.7; margin-top: 6px; }

    .spinner {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    .error-msg {
      background: #fff3f3;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      color: #dc2626;
    }

    /* Word card */
    .word-card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 2px 12px rgba(40,56,120,0.07);
      margin-bottom: 12px;
    }
    .word-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .word-phonetic {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .pos-block { margin-top: 14px; }
    .pos-label {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      text-transform: capitalize;
    }
    .definition-item {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      padding: 4px 0;
      border-bottom: 1px solid var(--line);
    }
    .definition-item:last-child { border-bottom: none; }
    .definition-example {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-top: 2px;
    }

    /* Translation card */
    .translation-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: 0 2px 12px rgba(40,56,120,0.07);
      margin-bottom: 12px;
    }
    .translation-card h3 {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .translation-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--header);
    }

    /* Save row */
    .save-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .save-row select {
      flex: 1;
      padding: 7px 10px;
      border-radius: 10px;
      border: 1.5px solid var(--line);
      font-size: 13px;
      font-family: inherit;
      background: var(--bg);
    }
    .btn-save {
      padding: 7px 18px;
      background: var(--header);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
    }
    .btn-save:hover { background: #5a6fd6; }
    .btn-save:disabled { opacity: 0.55; cursor: default; }

    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2430;
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div>
        <h1>Kriti</h1>
        <p>Word Lookup</p>
      </div>
    </div>
    <button class="btn-notes" id="btnNotes">My Notes ›</button>
  </div>

  <div class="search-bar">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Type a word or paste text…" autocomplete="off" />
      <button id="searchBtn">Look up</button>
    </div>
    <div class="lang-row">
      <label>Translate to:</label>
      <select id="langSelect" class="lang-select">
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="hi">Hindi</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="ru">Russian</option>
        <option value="tr">Turkish</option>
      </select>
    </div>
  </div>

  <div class="results" id="results">
    <div class="placeholder" id="placeholder">
      <div>Select text anywhere → press <strong>Ctrl+Shift+K</strong></div>
      <div>or type a word above to look it up.</div>
      <div class="hint">Definitions + translation in 12 languages.</div>
    </div>
    <div class="spinner" id="spinner">Looking up…</div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="lookup.js"></script>
</body>
</html>
