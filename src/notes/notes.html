<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://api.dictionaryapi.dev https://api.mymemory.translated.net;">
  <title>Kriti – Notes</title>
  <style>
    :root {
      --header: #667eea;
      --bg: #f4f6fc;
      --card: #ffffff;
      --muted: #667085;
      --text: #1f2430;
      --line: #e8ebf5;
      --shadow: 0 10px 24px rgba(40, 56, 120, 0.12);
      --stats-card: #f5f2ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      max-height: none;
      overflow: hidden;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top right, #dce2ff 0%, var(--bg) 36%);
      color: var(--text);
    }

    .header {
      background: var(--header);
      color: #ffffff;
      padding: 18px 18px 16px;
      box-shadow: 0 2px 12px rgba(58, 73, 160, 0.35);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .header p {
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.9;
    }

    .header-tabs {
      margin-top: 12px;
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }

    .tab-btn {
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .tab-btn.active {
      background: #ffffff;
      color: #4558b2;
    }

    .export-btn {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.95;
      transition: background 0.2s, opacity 0.2s;
    }

    .export-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      opacity: 1;
    }

    .export-btn svg {
      pointer-events: none;
    }

    .views {
      position: relative;
      height: calc(100vh - 112px);
      overflow: hidden;
    }

    .view-pane {
      position: absolute;
      inset: 0;
      padding: 14px;
      padding-bottom: 32px;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .view-pane.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .search-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
      padding-bottom: 10px;
    }

    .search-input-wrap {
      position: relative;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }

    .search-input-wrap:focus-within {
      border-color: #667eea;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #8c95b2;
      pointer-events: none;
      font-size: 13px;
    }

    .search-input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      font-size: 13px;
      color: var(--text);
      padding: 8px 34px 8px 30px;
      border-radius: 8px;
    }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #8c95b2;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: none;
    }

    .search-clear.visible {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .search-clear:hover {
      background: #eef1fc;
      color: #4b5680;
    }

    .search-hit {
      background: #fff59d;
      color: inherit;
      padding: 0 1px;
      border-radius: 2px;
    }

    .new-folder-btn {
      width: 100%;
      border: 1px dashed #c8cde5;
      background: #ffffff;
      color: #5a658a;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .new-folder-btn:hover {
      border-color: #9fa8d8;
      color: #44508a;
      background: #f9faff;
    }

    .new-folder-inline {
      display: none;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .new-folder-inline.visible {
      display: flex;
    }

    .new-folder-input {
      flex: 1;
      border: 1px solid #cfd5ec;
      border-radius: 8px;
      font-size: 12px;
      padding: 7px 9px;
      outline: none;
      background: #ffffff;
      color: #2b345a;
    }

    .new-folder-input:focus {
      border-color: #667eea;
    }

    .new-folder-confirm,
    .new-folder-cancel {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .new-folder-confirm {
      background: #e8f8ee;
      color: #1f7a48;
    }

    .new-folder-cancel {
      background: #f2f4f8;
      color: #546080;
    }

    .folder {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      overflow: visible;
      position: relative;
    }

    .folder.pinned-folder {
      border-left: 3px solid #7f6df2;
    }

    .folder.custom-folder .folder-header {
      background: #faf8ff;
    }

    .folder.custom-folder .folder-header:hover {
      background: #f4f1ff;
    }

    .folder-header {
      width: 100%;
      border: 0;
      cursor: pointer;
      background: #ffffff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      position: relative;
      overflow: visible;
    }

    .folder-header:hover {
      background: #f7f8fe;
    }

    .folder-drag-handle {
      color: #9ca3af;
      font-size: 13px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease;
      user-select: none;
      pointer-events: none;
      flex-shrink: 0;
    }

    .folder:hover .folder-drag-handle,
    .folder.dragging-folder .folder-drag-handle {
      opacity: 1;
    }

    .folder-chevron {
      color: var(--header);
      font-size: 12px;
      transition: transform 0.2s ease;
      width: 10px;
    }

    .folder-header.collapsed .folder-chevron {
      transform: rotate(-90deg);
    }

    .folder-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #2c3556;
    }

    .folder-type-icon {
      margin-right: 6px;
      font-size: 12px;
      opacity: 0.9;
    }

    .folder-badge {
      background: var(--header);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      min-width: 28px;
      text-align: center;
      padding: 3px 8px;
    }

    .folder-pin-btn {
      margin-left: 6px;
      width: 22px;
      height: 22px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #9aa1bb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .folder-pin-btn:hover {
      background: #edf0fb;
      color: #6f63cd;
    }

    .folder-pin-btn.pinned {
      color: #6f63cd;
    }

    .folder-menu-wrap {
      margin-left: 2px;
    }

    .folder-menu-btn {
      width: 22px;
      height: 22px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #8b93b0;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .folder-menu-btn:hover {
      background: #edf0fb;
      color: #586395;
    }

    .folder-menu-wrap .menu {
      position: absolute;
      z-index: 999;
      right: 8px;
      top: 40px;
    }

    .notes-list {
      padding: 0 12px 12px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
      border-radius: 0 0 12px 12px;
      position: relative;
    }

    .notes-list.hidden {
      display: none;
    }

    .notes-list.drop-zone-valid {
      border: 1px dashed #3b82f6;
      background: #f0f7ff;
    }

    .notes-list.drop-zone-invalid {
      border: 1px dashed #dc2626;
      background: #fff1f2;
    }

    .notes-list.drop-empty-valid::before,
    .notes-list.drop-empty-invalid::before {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      top: 8px;
      border-top: 2px solid #3b82f6;
    }

    .notes-list.drop-empty-invalid::before {
      border-top-color: #dc2626;
    }

    .add-word-section {
      margin-top: 10px;
    }

    .add-word-trigger {
      width: 100%;
      border: 1px dashed #c9d2ea;
      background: #ffffff;
      color: #5d688b;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .add-word-trigger:hover {
      border-color: #9eadde;
      background: #f8faff;
      color: #465381;
    }

    .add-word-form {
      overflow: hidden;
      margin-top: 8px;
      border: 1px dashed #b9d3ff;
      border-radius: 12px;
      background: #f7fbff;
      padding: 12px;
      animation: addWordSlideDown 0.2s ease;
    }

    .add-word-input,
    .add-word-textarea {
      width: 100%;
      border: 1px solid #d6def2;
      border-radius: 8px;
      background: #ffffff;
      color: #1f2430;
      font-size: 13px;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      padding: 8px 10px;
      outline: none;
      margin-bottom: 8px;
    }

    .add-word-input:focus,
    .add-word-textarea:focus {
      border-color: #7a92ee;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.12);
    }

    .add-word-textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.4;
    }

    .add-word-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .add-word-btn {
      border: 0;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 10px;
      cursor: pointer;
    }

    .add-word-btn.add {
      background: #38a169;
      color: #ffffff;
    }

    .add-word-btn.add:hover {
      background: #2f855a;
    }

    .add-word-btn.add:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .add-word-btn.cancel {
      background: #e5e7eb;
      color: #374151;
    }

    .add-word-btn.cancel:hover {
      background: #d1d5db;
    }

    @keyframes addWordSlideDown {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .custom-empty-hint {
      margin-top: 10px;
      border: 1px dashed #d6dcf4;
      border-radius: 8px;
      color: #677196;
      font-size: 12px;
      padding: 10px;
      background: #ffffff;
      line-height: 1.35;
    }

    .word-card {
      margin-top: 10px;
      border: 1px solid #e5e8f2;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      padding-left: 24px;
      position: relative;
      cursor: grab;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .word-card.dragging-card {
      opacity: 0.5;
      cursor: grabbing;
    }

    .word-card.drop-before-valid::before,
    .word-card.drop-before-invalid::before,
    .word-card.drop-after-valid::after,
    .word-card.drop-after-invalid::after {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      height: 0;
      border-top: 2px solid #3b82f6;
      pointer-events: none;
    }

    .word-card.drop-before-valid::before,
    .word-card.drop-before-invalid::before {
      top: -6px;
    }

    .word-card.drop-after-valid::after,
    .word-card.drop-after-invalid::after {
      bottom: -6px;
    }

    .word-card.drop-before-invalid::before,
    .word-card.drop-after-invalid::after {
      border-top-color: #dc2626;
    }

    .word-drag-handle {
      position: absolute;
      left: 6px;
      top: 8px;
      color: #9ca3af;
      font-size: 14px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease;
      user-select: none;
      pointer-events: none;
    }

    .word-card:hover .word-drag-handle,
    .word-card.dragging-card .word-drag-handle {
      opacity: 1;
    }

    .word-pin-indicator {
      position: absolute;
      top: 8px;
      right: 36px;
      font-size: 12px;
      color: #6f63cd;
      line-height: 1;
    }

    .word-card.edit-mode {
      border-color: #c9d7ff;
      background: #f8faff;
      box-shadow: 0 4px 12px rgba(83, 107, 206, 0.14);
    }

    .word-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .word-top-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .word-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.2;
    }

    .word-type-badge.word {
      background: #e5e7eb;
      color: #374151;
    }

    .word-type-badge.phrase {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .word-type-badge.sentence {
      background: #ede9fe;
      color: #6d28d9;
    }

    .word-title {
      font-size: 14px;
      font-weight: 700;
      color: #1f2430;
      word-break: break-word;
      flex: 1;
    }

    .folder.dragging-folder {
      opacity: 0.55;
    }

    .folder.folder-drop-valid {
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.35), var(--shadow);
    }

    .folder.folder-drop-invalid {
      box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.35), var(--shadow);
      background: #fff1f2;
    }

    .folder.folder-drop-before::before,
    .folder.folder-drop-after::after {
      content: '';
      position: absolute;
      left: 6px;
      right: 6px;
      border-top: 2px solid #3b82f6;
      pointer-events: none;
    }

    .folder.folder-drop-before::before {
      top: -6px;
    }

    .folder.folder-drop-after::after {
      bottom: -6px;
    }

    .folder.folder-drop-invalid.folder-drop-before::before,
    .folder.folder-drop-invalid.folder-drop-after::after {
      border-top-color: #dc2626;
    }

    .menu-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .menu-btn {
      border: 0;
      background: transparent;
      color: #646f95;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 18px;
      line-height: 1;
    }

    .menu-btn:hover {
      background: #edf0fb;
      color: #26305a;
    }

    .menu {
      position: absolute;
      right: 0;
      top: 32px;
      min-width: 170px;
      background: #fff;
      border: 1px solid #dbe0ef;
      border-radius: 10px;
      box-shadow: 0 12px 24px rgba(35, 44, 80, 0.18);
      z-index: 40;
      padding: 6px;
    }

    .menu.hidden {
      display: none;
    }

    .menu-item {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 12px;
      color: #273055;
    }

    .menu-item:hover {
      background: #eef1fc;
    }

    .menu-item.delete {
      color: #b42318;
    }

    .menu-item.disabled {
      opacity: 0.55;
      cursor: default;
    }

    .move-list {
      margin-top: 6px;
      border-top: 1px solid #ecf0fa;
      padding-top: 5px;
    }

    .move-list.hidden {
      display: none;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .meta strong {
      color: #1f2430;
      margin-right: 4px;
    }

    .personal-note {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      color: #4e5675;
      background: #f6f8ff;
      border: 1px solid #e3e9ff;
      border-radius: 8px;
      padding: 6px 8px;
      margin-top: 4px;
    }

    .personal-note-icon {
      line-height: 1.2;
      flex-shrink: 0;
    }

    .edit-fields {
      display: grid;
      gap: 8px;
    }

    .edit-input,
    .edit-textarea {
      width: 100%;
      border: 1px solid #c9d7ff;
      border-radius: 8px;
      background: #fff;
      color: #1f2430;
      font-size: 13px;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      padding: 8px 10px;
      outline: none;
    }

    .edit-input:focus,
    .edit-textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.15);
    }

    .edit-textarea {
      min-height: 70px;
      resize: vertical;
      line-height: 1.35;
    }

    .edit-actions {
      margin-top: 2px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .edit-btn {
      border: 0;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 10px;
      cursor: pointer;
    }

    .edit-btn.save {
      background: #38a169;
      color: #fff;
    }

    .edit-btn.save:hover {
      background: #2f855a;
    }

    .edit-btn.cancel {
      background: #e5e7eb;
      color: #374151;
    }

    .edit-btn.cancel:hover {
      background: #d1d5db;
    }

    .timestamp {
      margin-top: 8px;
      font-size: 11px;
      color: #8f97b2;
    }

    .stats-grid {
      display: grid;
      gap: 10px;
    }

    .stats-card {
      background: var(--stats-card);
      border: 1px solid #e5defd;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .stats-label {
      font-size: 11px;
      color: #6b5fa3;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 700;
    }

    .stats-value {
      font-size: 22px;
      font-weight: 800;
      color: #2f2a55;
      line-height: 1.1;
    }

    .stats-sub {
      margin-top: 4px;
      font-size: 12px;
      color: #6f7090;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 92px 1fr 34px;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .chart-word {
      font-size: 12px;
      color: #3e4569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-track {
      height: 10px;
      border-radius: 999px;
      background: #e9e2ff;
      overflow: hidden;
    }

    .chart-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7a86f9 0%, #9e6bff 100%);
    }

    .chart-count {
      font-size: 11px;
      color: #5a6087;
      text-align: right;
      font-weight: 700;
    }

    .recent-list {
      margin-top: 6px;
      max-height: 170px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #e6e0fb;
      border-radius: 8px;
      padding: 6px 8px;
      margin-top: 6px;
    }

    .recent-word {
      font-size: 12px;
      color: #2e3458;
      font-weight: 600;
      word-break: break-word;
    }

    .recent-time {
      font-size: 11px;
      color: #7d84a6;
      white-space: nowrap;
    }

    .stats-empty {
      margin-top: 8px;
      font-size: 12px;
      color: #7d84a6;
    }

    .empty-state {
      margin-top: 18px;
      background: #fff;
      border-radius: 12px;
      border: 1px dashed #ccd3ec;
      color: #5f6784;
      text-align: center;
      padding: 34px 20px;
    }

    .empty-state-icon {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .view-pane::-webkit-scrollbar {
      width: 8px;
    }

    .view-pane::-webkit-scrollbar-track {
      background: #e5e9f6;
      border-radius: 10px;
    }

    .view-pane::-webkit-scrollbar-thumb {
      background: #a0abd9;
      border-radius: 10px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%) translateY(10px);
      background: #2f855a;
      color: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 60;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Dark mode ──────────────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root {
        --header:     #3d3f6e;
        --bg:         #13141f;
        --card:       #1e1f2e;
        --muted:      #8b93b8;
        --text:       #e2e4f0;
        --line:       #2e3050;
        --shadow:     0 10px 24px rgba(0,0,0,0.4);
        --stats-card: #1e1f2e;
      }
      body { background: #13141f; }

      /* Folder */
      .folder-header { background: #1e1f2e; }
      .folder-header:hover { background: #252640; }
      .folder.custom-folder .folder-header { background: #1e1f2e; }
      .folder.custom-folder .folder-header:hover { background: #252640; }
      .folder-title { color: #c5c9df; }
      .folder-chevron { color: #818cf8; }
      .folder-pin-btn { color: #8b93b8; }
      .folder-pin-btn:hover { background: #252640; color: #9d8fdc; }
      .folder-menu-btn { color: #8b93b8; }
      .folder-menu-btn:hover { background: #252640; color: #c5c9df; }
      .folder.folder-drop-invalid { background: #2a1820; }

      /* Notes list */
      .notes-list { background: #181929; }
      .notes-list.drop-zone-valid { background: #131d2e; }
      .notes-list.drop-zone-invalid { background: #1e1318; }
      .custom-empty-hint { background: #181929; border-color: #2e3050; color: #8b93b8; }

      /* Word card */
      .word-card { background: #1e1f2e; border-color: #2e3050; }
      .word-card:hover { background: #252640; }
      .word-card.edit-mode { background: #1a2035; border-color: #3d4878; }
      .word-title { color: #e2e4f0; }
      .word-type-badge.word     { background: #2a2c40; color: #c5c9df; }
      .word-type-badge.phrase   { background: #1a2840; color: #7eb3f5; }
      .word-type-badge.sentence { background: #231d3a; color: #a990f5; }

      /* Meta, personal note */
      .meta strong { color: #e2e4f0; }
      .personal-note { color: #b0b8d8; background: #1a1b2e; border-color: #2e3050; }

      /* Context menu */
      .menu { background: #1e1f2e; border-color: #2e3050; }
      .menu-item { color: #c5c9df; }
      .menu-item:hover { background: #252640; }
      .menu-item.delete { color: #f87171; }
      .move-list { border-top-color: #2e3050; }
      .menu-btn { color: #8b93b8; }
      .menu-btn:hover { background: #252640; color: #c5c9df; }

      /* Search bar */
      .search-wrap { background: #13141f; }
      .search-input-wrap { background: #1e1f2e; border-color: #2e3050; }
      .search-input { color: #e2e4f0; }
      .search-clear { color: #8b93b8; }
      .search-clear:hover { background: #252640; color: #c5c9df; }
      .search-hit { background: #3d3900; color: #f5e070; }

      /* New folder */
      .new-folder-btn { background: #1e1f2e; color: #8b93b8; border-color: #2e3050; }
      .new-folder-btn:hover { background: #252640; color: #c5c9df; }
      .new-folder-input { background: #1e1f2e; color: #e2e4f0; border-color: #2e3050; }
      .new-folder-cancel { background: #252640; color: #a0a8c8; }

      /* Add-word form */
      .add-word-form { background: #181929; border-color: #2e3050; }
      .add-word-input, .add-word-textarea { background: #1e1f2e; color: #e2e4f0; border-color: #2e3050; }
      .add-word-btn.cancel { background: #252640; color: #a0a8c8; }
      .add-word-trigger { background: #1e1f2e; color: #8b93b8; border-color: #2e3050; }
      .add-word-trigger:hover { background: #252640; border-color: #4a5080; color: #c5c9df; }

      /* Edit fields */
      .edit-input, .edit-textarea { background: #1e1f2e; color: #e2e4f0; border-color: #2e3050; }
      .edit-btn.cancel { background: #252640; color: #a0a8c8; }

      /* Stats */
      .stats-card { background: #1e1f2e; border-color: #2e3050; }
      .stats-label { color: #9d8fdc; }
      .stats-value { color: #e2e4f0; }
      .stats-sub { color: #8b93b8; }
      .chart-word { color: #c5c9df; }
      .chart-track { background: #252640; }
      .chart-count { color: #8b93b8; }
      .recent-item { background: #1e1f2e; border-color: #2e3050; }
      .recent-word { color: #c5c9df; }
      .recent-time { color: #8b93b8; }
      .stats-empty { color: #8b93b8; }

      /* Misc */
      .empty-state { background: #1e1f2e; border-color: #2e3050; color: #8b93b8; }
      .tab-btn { color: rgba(255,255,255,0.8); }
      .tab-btn.active { background: #fff; color: #3d3f6e; }
      .timestamp { color: #6b7399; }
      .view-pane::-webkit-scrollbar-track { background: #181929; }
      .view-pane::-webkit-scrollbar-thumb { background: #3a3d60; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1>Kriti</h1>
      <div style="display:inline-flex;align-items:center;gap:4px">
        <button id="btnTheme" class="export-btn" type="button" aria-label="Toggle theme" title="Toggle light / dark / system theme">
          <!-- icon swapped by JS -->
          <svg id="themeIconSun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="themeIconMoon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="themeIconAuto" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <button id="exportBtn" class="export-btn" type="button" aria-label="Export notes">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>
    <p>Saved words grouped by page title</p>
    <div class="header-tabs">
      <button class="tab-btn active" data-tab="notes" type="button">Notes</button>
      <button class="tab-btn" data-tab="stats" type="button">Stats</button>
    </div>
  </div>

  <div class="views">
    <section id="notesView" class="view-pane active">
      <div class="search-wrap">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Search saved words..."
            autocomplete="off"
          >
          <button id="searchClear" class="search-clear" type="button" aria-label="Clear search">×</button>
        </div>
      </div>

      <button id="newFolderTrigger" class="new-folder-btn" type="button">New Folder +</button>
      <div id="newFolderInline" class="new-folder-inline">
        <input id="newFolderInput" class="new-folder-input" type="text" placeholder="Type folder name">
        <button id="newFolderConfirm" class="new-folder-confirm" type="button" aria-label="Create folder">✓</button>
        <button id="newFolderCancel" class="new-folder-cancel" type="button" aria-label="Cancel folder creation">×</button>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📝</div>
        <p>No saved notes yet. Select text on any webpage to start saving words.</p>
      </div>
      <div class="empty-state" id="noResults" style="display:none;"></div>
      <div id="notesContainer"></div>
    </section>

    <section id="statsView" class="view-pane">
      <div class="stats-grid">
        <article class="stats-card">
          <div class="stats-label">Total Words Looked Up</div>
          <div id="totalLookupsValue" class="stats-value">0</div>
        </article>
        <article class="stats-card">
          <div class="stats-label">Total Words Saved</div>
          <div id="totalSavedValue" class="stats-value">0</div>
        </article>
        <article class="stats-card">
          <div class="stats-label">Most Looked Up Word</div>
          <div id="mostLookedUpValue" class="stats-value">-</div>
          <div id="mostLookedUpSub" class="stats-sub"></div>
        </article>
        <article class="stats-card">
          <div class="stats-label">Top 5 Looked Up Words</div>
          <div id="topWordsChart" class="chart"></div>
        </article>
        <article class="stats-card">
          <div class="stats-label">Most Used Translation Language</div>
          <div id="mostLanguageValue" class="stats-value">-</div>
          <div id="mostLanguageSub" class="stats-sub"></div>
        </article>
        <article class="stats-card">
          <div class="stats-label">This Week vs Last Week</div>
          <div id="weekStatsValue" class="stats-value">0 / 0</div>
          <div class="stats-sub">This week / Last week lookups</div>
        </article>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="../chrome-storage-shim.js"></script>
  <script src="notes.js"></script>
</body>
</html>
