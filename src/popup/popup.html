<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline';
             connect-src https://api.dictionaryapi.dev https://api.mymemory.translated.net;">
  <title>Kriti</title>
  <style>
    :root {
      --accent: #667eea;
      --accent-dark: #5a6fd6;
      --bg: #ffffff;
      --surface: #f5f7ff;
      --text: #1f2430;
      --muted: #667085;
      --line: #e8ebf5;
      --green: #38a169;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      border-radius: var(--radius);
      user-select: none;
    }

    /* Make the window draggable from the header bar */
    #dragBar {
      -webkit-app-region: drag;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    #dragBar .app-name {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    #dragBar .drag-hint {
      font-size: 10px;
      opacity: 0.7;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .btn-notes-link {
      -webkit-app-region: no-drag;
      font-size: 11px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-notes-link:hover { background: rgba(255,255,255,0.28); }

    .btn-close {
      -webkit-app-region: no-drag;
      width: 22px;
      height: 22px;
      background: rgba(255,255,255,0.18);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-close:hover { background: rgba(255,255,255,0.35); }

    /* Scrollable content area */
    #content {
      overflow-y: auto;
      max-height: calc(100vh - 44px);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Mode badge + word row */
    .word-section {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .mode-badge {
      flex-shrink: 0;
      background: var(--surface);
      color: var(--muted);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .word-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      word-break: break-word;
      flex: 1;
    }

    .action-btn {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: #9ca3af;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s, background 0.15s;
    }
    .action-btn:hover { color: var(--accent); background: #f0f2ff; }
    .action-btn.active { color: var(--accent); }
    .action-btn.speaking {
      color: var(--accent);
      animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    /* Definition card */
    .card {
      background: var(--surface);
      border-radius: 10px;
      padding: 11px 12px;
      border-left: 3px solid var(--accent);
    }
    .card.translation-card { border-left-color: var(--green); }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-body {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
    }

    .example-text {
      font-style: italic;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .pos-badge {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      margin-bottom: 4px;
      text-transform: capitalize;
    }

    /* Language row */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .lang-label { font-size: 12px; color: var(--muted); }
    .lang-select {
      padding: 4px 10px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-size: 12px;
      font-family: inherit;
      background: var(--bg);
      cursor: pointer;
      outline: none;
      color: var(--text);
    }
    .lang-select:focus { border-color: var(--accent); }

    /* Save row */
    .save-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn-new-folder {
      padding: 7px 9px;
      background: transparent;
      border: 1.5px dashed var(--line);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .btn-new-folder:hover { border-color: var(--accent); color: var(--accent); }
    .new-folder-row {
      display: none;
      gap: 6px;
      align-items: center;
      width: 100%;
    }
    .new-folder-row.visible { display: flex; }
    .new-folder-input {
      flex: 1;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 7px 9px;
      outline: none;
    }
    .new-folder-input:focus { border-color: var(--accent); }
    .btn-nf-ok, .btn-nf-cancel {
      width: 28px; height: 28px;
      border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer; flex-shrink: 0;
    }
    .btn-nf-ok     { background: #d1fae5; color: #065f46; }
    .btn-nf-cancel { background: var(--surface); color: var(--muted); }
    .folder-select {
      flex: 1;
      min-width: 0;
      padding: 7px 10px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-size: 12px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }
    .folder-select:focus { border-color: var(--accent); }
    .btn-save {
      padding: 7px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--accent-dark); }
    .btn-save:disabled { opacity: 0.6; cursor: default; }
    .btn-save.warn { background: #f59e0b; }
    .btn-save.warn:hover { background: #d97706; }
    .btn-search {
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      color: var(--muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
    }
    .btn-search:hover { border-color: var(--accent); color: var(--accent); }

    /* States */
    .loading-text { color: var(--muted); font-style: italic; font-size: 12px; }
    .error-text { color: #dc2626; font-size: 12px; }

    /* Search mode (shown when no word was auto-copied) */
    #searchMode {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 18px 14px;
    }
    #searchMode.visible { display: flex; }
    .search-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
    .search-hint strong { color: var(--text); display: block; font-size: 14px; margin-bottom: 4px; }
    .search-box-wrap {
      display: flex;
      width: 100%;
      gap: 6px;
    }
    #manualInput {
      flex: 1;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 8px 10px;
      outline: none;
    }
    #manualInput:focus { border-color: var(--accent); }
    #manualSearchBtn {
      padding: 8px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    #manualSearchBtn:hover { background: var(--accent-dark); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: #1f2430;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Scrollbar */
    #content::-webkit-scrollbar { width: 5px; }
    #content::-webkit-scrollbar-track { background: transparent; }
    #content::-webkit-scrollbar-thumb { background: #c0c8e8; border-radius: 10px; }

    /* ── Dark mode ─────────────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root {
        --accent:       #818cf8;
        --accent-dark:  #6366f1;
        --bg:           #1e1f2e;
        --surface:      #292a3e;
        --text:         #e2e4f0;
        --muted:        #8b93b8;
        --line:         #35374f;
        --green:        #4ade80;
      }
      html, body { background: var(--bg); }
      #dragBar   { background: #252640; }
      .lang-select, .folder-select { background: #252640; color: var(--text); border-color: var(--line); }
      .btn-notes-link { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
      .btn-close { background: rgba(255,255,255,0.1); }
      .btn-search { background: #252640; color: var(--muted); border-color: var(--line); }
      .btn-search:hover { border-color: var(--accent); color: var(--accent); }
    }
  </style>
</head>
<body>

  <!-- Drag bar (moves the window) -->
  <div id="dragBar">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="app-name">Kriti</span>
      <span id="offlineBadge" style="display:none;align-items:center;gap:3px;font-size:10px;font-weight:600;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:1px 7px;border-radius:20px;letter-spacing:0.2px">&#9679; Offline</span>
    </div>
    <div class="header-right">
      <button class="btn-notes-link" id="btnNotes" type="button">My Notes</button>
      <button class="btn-close" id="btnClose" type="button" title="Close (Esc)">&#x2715;</button>
    </div>
  </div>

  <!-- Search mode: shown when shortcut fired but no text was auto-copied -->
  <div id="searchMode">
    <div class="search-hint">
      <strong>Type to look up</strong>
      No text was auto-copied. Type a word below.
    </div>
    <div class="search-box-wrap">
      <input id="manualInput" type="text" placeholder="Enter a word or phrase…" autocomplete="off" spellcheck="false">
      <button id="manualSearchBtn" type="button">Go</button>
    </div>
  </div>

  <!-- Main content -->
  <div id="content">
    <!-- Word -->
    <div class="word-section" id="wordSection">
      <span class="mode-badge" id="modeBadge">Word</span>
      <span class="word-text" id="wordText">—</span>
      <button class="action-btn" id="btnSpeakWord" title="Read aloud">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <button class="action-btn" id="btnCopy" title="Copy details">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>

    <!-- Definition -->
    <div class="card" id="defCard">
      <div class="card-label">
        <span>Definition</span>
        <button class="action-btn" id="btnSpeakDef" title="Read definition aloud" style="width:20px;height:20px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
      <div class="card-body" id="defBody"><span class="loading-text">Loading…</span></div>
    </div>

    <!-- Translation -->
    <div class="card translation-card" id="transCard" style="display:none">
      <div class="card-label">
        <span id="transLabel">Translation</span>
        <button class="action-btn" id="btnSpeakTrans" title="Read translation aloud" style="width:20px;height:20px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
      <div class="card-body" id="transBody">—</div>
    </div>

    <!-- Language row -->
    <div class="lang-row">
      <span class="lang-label">Translate to:</span>
      <select id="langSelect" class="lang-select">
        <option value="hi">Hindi</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ar">Arabic</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="kn">Kannada</option>
        <option value="bn">Bengali</option>
        <option value="pt">Portuguese</option>
      </select>
    </div>

    <!-- Save / Search -->
    <div id="saveArea"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
